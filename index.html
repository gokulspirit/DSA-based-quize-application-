<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSA Quiz App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="header">
    <h1>DSA Quiz App</h1>
    <button id="googleSignIn">Sign In with Google</button>
    <button id="googleSignOut" style="display:none;">Sign Out</button>
  </div>

  <div class="quiz-container" id="quizBox" style="display: none;">
    <div class="question-box">
      <h2 id="questionText">Question appears here</h2>
      <ul id="optionsList"></ul>
    </div>
    <div class="controls">
      <button id="nextBtn">Next</button>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="explanation" class="explanation-box"></div>
    <div id="timer">Time Left: <span id="time">15</span>s</div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="questions.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
