<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Quiz Application</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 600px;
    }
    h1 {
      text-align: center;
    }
    .question {
      font-size: 1.2rem;
      margin: 1rem 0;
    }
    .options {
      display: flex;
      flex-direction: column;
    }
    .option {
      background: #f0f0f0;
      border: none;
      padding: 0.8rem;
      margin: 0.5rem 0;
      border-radius: 5px;
      cursor: pointer;
      text-align: left;
      transition: background 0.3s;
    }
    .option:hover {
      background: #dcdcdc;
    }
    .option.correct {
      background: #c8e6c9;
    }
    .option.wrong {
      background: #ffcdd2;
    }
    #nextBtn {
      margin-top: 1rem;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      border: none;
      background: #1976d2;
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
    }
    #nextBtn:hover {
      background: #1565c0;
    }
    #scoreContainer {
      display: none;
      text-align: center;
    }
    #restartBtn {
      margin-top: 1rem;
      background: #4caf50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DSA Quiz</h1>
    <div id="quizContainer">
      <div class="question" id="question">Loading...</div>
      <div class="options" id="options"></div>
      <button id="nextBtn">Next</button>
    </div>
    <div id="scoreContainer">
      <h2>Your Score: <span id="score"></span>/50</h2>
      <button id="restartBtn">Restart Quiz</button>
    </div>
  </div>  <script>
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("nextBtn");
    const scoreContainer = document.getElementById("scoreContainer");
    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");

    let currentQuestionIndex = 0;
    let score = 0;

    const questions = [
      // Add all 50 questions here (already provided previously)
    ];

    function loadQuestion() {
      const currentQuestion = questions[currentQuestionIndex];
      questionEl.textContent = `${currentQuestionIndex + 1}. ${currentQuestion.question}`;
      optionsEl.innerHTML = "";
      currentQuestion.options.forEach(option => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.classList.add("option");
        btn.onclick = () => selectOption(btn, currentQuestion.answer);
        optionsEl.appendChild(btn);
      });
      nextBtn.style.display = "none";
    }

    function selectOption(button, correctAnswer) {
      const allOptions = document.querySelectorAll(".option");
      allOptions.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === correctAnswer) {
          btn.classList.add("correct");
        } else if (btn === button) {
          btn.classList.add("wrong");
        }
      });
      if (button.textContent === correctAnswer) {
        score++;
      }
      nextBtn.style.display = "block";
    }

    nextBtn.onclick = () => {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        loadQuestion();
      } else {
        showScore();
      }
    };

    function showScore() {
      document.getElementById("quizContainer").style.display = "none";
      scoreContainer.style.display = "block";
      scoreEl.textContent = score;
    }

    restartBtn.onclick = () => {
      currentQuestionIndex = 0;
      score = 0;
      scoreContainer.style.display = "none";
      document.getElementById("quizContainer").style.display = "block";
      loadQuestion();
    };

    // Initialize the first question
    loadQuestion();
  </script></body>
</html>
