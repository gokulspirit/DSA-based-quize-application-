<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Quiz</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div id="user-status"></div>
  <button id="login-btn">Login with Google (Simulated)</button>
  <button id="logout-btn" style="display: none;">Logout</button>

  <div id="quiz-container"></div>
  <button id="submit-btn">Submit Quiz</button>

  <script>
    const questions = [
      {
        question: "What is the time complexity of binary search?",
        answers: [
          { text: "O(n)", correct: false },
          { text: "O(log n)", correct: true },
          { text: "O(n log n)", correct: false },
          { text: "O(1)", correct: false }
        ],
        explanation: "Binary search divides the array in half each step, hence O(log n)."
      },
      {
        question: "Which data structure uses FIFO order?",
        answers: [
          { text: "Stack", correct: false },
          { text: "Queue", correct: true },
          { text: "Tree", correct: false },
          { text: "Graph", correct: false }
        ],
        explanation: "Queue follows First In First Out order."
      },
      {
        question: "What is the space complexity of quicksort in the worst case?",
        answers: [
          { text: "O(n)", correct: false },
          { text: "O(log n)", correct: true },
          { text: "O(n log n)", correct: false },
          { text: "O(1)", correct: false }
        ],
        explanation: "In the worst case, quicksort requires O(log n) space due to the recursive calls."
      },
      {
  question: "Which traversal is used to get the contents of a binary search tree in ascending order?",
  answers: [
    { text: "Preorder", correct: false },
    { text: "Inorder", correct: true },
    { text: "Postorder", correct: false },
    { text: "Level order", correct: false }
  ],
  explanation: "Inorder traversal of a BST returns elements in sorted order."
},
{
  question: "Which of the following is not a stable sorting algorithm?",
  answers: [
    { text: "Bubble Sort", correct: false },
    { text: "Merge Sort", correct: false },
    { text: "Selection Sort", correct: true },
    { text: "Insertion Sort", correct: false }
  ],
  explanation: "Selection Sort is not stable as it might change the relative order of equal elements."
},
{
  question: "What is the worst-case time complexity of Merge Sort?",
  answers: [
    { text: "O(n^2)", correct: false },
    { text: "O(n log n)", correct: true },
    { text: "O(log n)", correct: false },
    { text: "O(n)", correct: false }
  ],
  explanation: "Merge sort always runs in O(n log n) time."
},
{
  question: "Which data structure is used in the implementation of recursion?",
  answers: [
    { text: "Queue", correct: false },
    { text: "Stack", correct: true },
    { text: "Heap", correct: false },
    { text: "Tree", correct: false }
  ],
  explanation: "Recursion uses the call stack for function calls."
},
{
  question: "Which algorithm is used to find the shortest path in a graph with negative weights?",
  answers: [
    { text: "Dijkstra's Algorithm", correct: false },
    { text: "Prim's Algorithm", correct: false },
    { text: "Bellman-Ford Algorithm", correct: true },
    { text: "Kruskal's Algorithm", correct: false }
  ],
  explanation: "Bellman-Ford works with graphs containing negative weights."
},
{
  question: "Which of the following is not a self-balancing binary search tree?",
  answers: [
    { text: "AVL Tree", correct: false },
    { text: "Red-Black Tree", correct: false },
    { text: "Binary Heap", correct: true },
    { text: "Splay Tree", correct: false }
  ],
  explanation: "Binary Heap is not a BST; it's a complete binary tree."
},
{
  question: "Which hashing technique handles collisions by storing elements in a linked list?",
  answers: [
    { text: "Open Addressing", correct: false },
    { text: "Chaining", correct: true },
    { text: "Double Hashing", correct: false },
    { text: "Linear Probing", correct: false }
  ],
  explanation: "Chaining stores collided elements in a list at each hash index."
},
{
  question: "Which operation is faster in a doubly linked list than in a singly linked list?",
  answers: [
    { text: "Insertion at end", correct: false },
    { text: "Traversal", correct: false },
    { text: "Deletion of a node when reference to node is given", correct: true },
    { text: "Searching", correct: false }
  ],
  explanation: "Deletion is easier in doubly linked lists as you can go backward too."
},
{
  question: "What is the auxiliary space of Depth First Search (DFS) on a graph?",
  answers: [
    { text: "O(1)", correct: false },
    { text: "O(V)", correct: true },
    { text: "O(E)", correct: false },
    { text: "O(V+E)", correct: false }
  ],
  explanation: "DFS needs a visited array or recursion stack of size V."
},
{
  question: "In which case does linear search perform better than binary search?",
  answers: [
    { text: "Sorted large arrays", correct: false },
    { text: "Unsorted arrays", correct: true },
    { text: "Binary Trees", correct: false },
    { text: "Linked Lists", correct: false }
  ],
  explanation: "Binary search requires sorted arrays, but linear works for unsorted ones."
},
{
  question: "What is the space complexity of Breadth First Search (BFS)?",
  answers: [
    { text: "O(1)", correct: false },
    { text: "O(V)", correct: true },
    { text: "O(E)", correct: false },
    { text: "O(V+E)", correct: false }
  ],
  explanation: "BFS uses a queue to store vertices, hence O(V) in worst case."
},
{
  question: "Which data structure is ideal for implementing LRU cache?",
  answers: [
    { text: "Stack", correct: false },
    { text: "Queue", correct: false },
    { text: "HashMap + Doubly Linked List", correct: true },
    { text: "Array", correct: false }
  ],
  explanation: "HashMap for O(1) access and Doubly Linked List for order."
},
{
  question: "What is the maximum number of nodes in a binary tree of height h?",
  answers: [
    { text: "2^h", correct: false },
    { text: "2^(h+1) - 1", correct: true },
    { text: "2h", correct: false },
    { text: "h^2", correct: false }
  ],
  explanation: "A complete binary tree of height h has max 2^(h+1) - 1 nodes."
},
{
  question: "Which sorting algorithm is best for small datasets and mostly sorted arrays?",
  answers: [
    { text: "Merge Sort", correct: false },
    { text: "Quick Sort", correct: false },
    { text: "Insertion Sort", correct: true },
    { text: "Heap Sort", correct: false }
  ],
  explanation: "Insertion sort performs efficiently on small or nearly sorted datasets."
},
{
  question: "Which data structure is used in BFS traversal of a graph?",
  answers: [
    { text: "Stack", correct: false },
    { text: "Queue", correct: true },
    { text: "Set", correct: false },
    { text: "Heap", correct: false }
  ],
  explanation: "BFS uses queue to traverse level by level."
},
{
  question: "Which algorithm is used to detect cycles in a directed graph?",
  answers: [
    { text: "Prim's Algorithm", correct: false },
    { text: "Topological Sort with DFS", correct: true },
    { text: "Dijkstra's Algorithm", correct: false },
    { text: "Kruskal's Algorithm", correct: false }
  ],
  explanation: "Topological sorting with DFS can help detect cycles in directed graphs."
},
{
  question: "What is the purpose of a priority queue?",
  answers: [
    { text: "To store elements in sorted order", correct: false },
    { text: "To delete highest priority element first", correct: true },
    { text: "To implement LIFO", correct: false },
    { text: "To implement FIFO", correct: false }
  ],
  explanation: "Priority queues always serve the highest priority item first."
}
      {
  question: "Which traversal of a binary tree gives sorted output for a BST?",
  answers: [
    { text: "Preorder", correct: false },
    { text: "Inorder", correct: true },
    { text: "Postorder", correct: false },
    { text: "Level order", correct: false }
  ],
  explanation: "Inorder traversal of BST returns nodes in ascending order."
},
{
  question: "Which algorithm is used to find the shortest path in a weighted graph?",
  answers: [
    { text: "DFS", correct: false },
    { text: "Dijkstra’s Algorithm", correct: true },
    { text: "BFS", correct: false },
    { text: "Prim’s Algorithm", correct: false }
  ],
  explanation: "Dijkstra's algorithm finds the shortest path in weighted graphs without negative weights."
},
{
  question: "What is the auxiliary space of merge sort?",
  answers: [
    { text: "O(1)", correct: false },
    { text: "O(n)", correct: true },
    { text: "O(log n)", correct: false },
    { text: "O(n log n)", correct: false }
  ],
  explanation: "Merge Sort uses additional space for merging arrays, hence O(n) auxiliary space."
},
{
  question: "What data structure is used for recursion?",
  answers: [
    { text: "Queue", correct: false },
    { text: "Array", correct: false },
    { text: "Stack", correct: true },
    { text: "Linked List", correct: false }
  ],
  explanation: "Recursion uses the call stack internally for function calls."
},
{
  question: "Which algorithm is used to find strongly connected components in a graph?",
  answers: [
    { text: "Kruskal’s Algorithm", correct: false },
    { text: "Kosaraju’s Algorithm", correct: true },
    { text: "Prim’s Algorithm", correct: false },
    { text: "Bellman-Ford Algorithm", correct: false }
  ],
  explanation: "Kosaraju's algorithm is efficient for finding strongly connected components."
},
{
  question: "What is the time complexity of searching in a balanced binary search tree?",
  answers: [
    { text: "O(n)", correct: false },
    { text: "O(log n)", correct: true },
    { text: "O(1)", correct: false },
    { text: "O(n log n)", correct: false }
  ],
  explanation: "In a balanced BST, the height is log n, hence search takes O(log n) time."
},
{
  question: "Which data structure is used in undo operations in text editors?",
  answers: [
    { text: "Queue", correct: false },
    { text: "Stack", correct: true },
    { text: "Deque", correct: false },
    { text: "Hash Table", correct: false }
  ],
  explanation: "Stack stores the most recent operation on top for easy undo."
},
{
  question: "Which sorting algorithm has the best average-case performance?",
  answers: [
    { text: "Bubble Sort", correct: false },
    { text: "Quick Sort", correct: true },
    { text: "Selection Sort", correct: false },
    { text: "Insertion Sort", correct: false }
  ],
  explanation: "Quick sort performs best on average with O(n log n) time."
},
{
  question: "Which of the following is not a self-balancing binary search tree?",
  answers: [
    { text: "AVL Tree", correct: false },
    { text: "Red-Black Tree", correct: false },
    { text: "Binary Heap", correct: true },
    { text: "Splay Tree", correct: false }
  ],
  explanation: "Binary heap is a complete tree but not a binary search tree."
},
{
  question: "Which algorithm helps in solving the maximum subarray problem?",
  answers: [
    { text: "Kruskal’s Algorithm", correct: false },
    { text: "Kadane’s Algorithm", correct: true },
    { text: "Prim’s Algorithm", correct: false },
    { text: "Dijkstra’s Algorithm", correct: false }
  ],
  explanation: "Kadane’s Algorithm finds the maximum sum contiguous subarray in O(n) time."
}
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let user = null;

    const questionEl = document.getElementById("question");
    const answerButtons = document.getElementById("answer-buttons");
    const nextBtn = document.getElementById("next-btn");
    const restartBtn = document.getElementById("restart-btn");
    const timerEl = document.getElementById("time");
    const explanationEl = document.getElementById("explanation");

    document.getElementById("darkToggle").addEventListener("change", () => {
      document.body.classList.toggle("dark");
    });

    nextBtn.addEventListener("click", () => {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        showQuestion();
      } else {
        showScore();
      }
    });

    restartBtn.addEventListener("click", () => {
      score = 0;
      currentQuestionIndex = 0;
      restartBtn.style.display = "none";
      showQuestion();
    });

    function showQuestion() {
      resetState();
      startTimer();

      const currentQuestion = questions[currentQuestionIndex];
      questionEl.innerText = currentQuestion.question;

      currentQuestion.answers.forEach(answer => {
        const btn = document.createElement("button");
        btn.innerText = answer.text;
        btn.classList.add("btn");
        if (answer.correct) btn.dataset.correct = answer.correct;
        btn.addEventListener("click", selectAnswer);
        answerButtons.appendChild(btn);
      });
    }

    function resetState() {
      clearInterval(timer);
      nextBtn.style.display = "none";
      explanationEl.style.display = "none";
      answerButtons.innerHTML = "";
      timeLeft = 15;
      timerEl.innerText = timeLeft;
    }

    function startTimer() {
      timer = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if (timeLeft === 0) {
          clearInterval(timer);
          autoSelectAnswer();
        }
      }, 1000);
    }

    function autoSelectAnswer() {
      const correctBtn = Array.from(answerButtons.children).find(btn => btn.dataset.correct === "true");
      if (correctBtn) correctBtn.classList.add("correct");

      Array.from(answerButtons.children).forEach(btn => btn.disabled = true);
      explanationEl.innerText = questions[currentQuestionIndex].explanation;
      explanationEl.style.display = "block";
      nextBtn.style.display = "block";
    }

    function selectAnswer(e) {
      clearInterval(timer);
      const selected = e.target;
      const isCorrect = selected.dataset.correct === "true";
      if (isCorrect) {
        selected.classList.add("correct");
        score++;
      } else {
        selected.classList.add("wrong");
      }

      Array.from(answerButtons.children).forEach(button => {
        if (button.dataset.correct === "true") button.classList.add("correct");
        button.disabled = true;
      });

      explanationEl.innerText = questions[currentQuestionIndex].explanation;
      explanationEl.style.display = "block";
      nextBtn.style.display = "block";
    }

    function showScore() {
      clearInterval(timer);
      questionEl.innerText = `You scored ${score} out of ${questions.length}!`;
      answerButtons.innerHTML = "";
      nextBtn.style.display = "none";
      restartBtn.style.display = "block";
      explanationEl.style.display = "none";

      const scoreData = {
        user: user || "Anonymous",
        score: score,
        date: new Date().toLocaleString(),
      };

      localStorage.setItem("quizScore", JSON.stringify(scoreData));
      console.log("Score saved to localStorage.");
    }

    // Simulate Login/Logout
    document.getElementById("login-btn").addEventListener("click", () => {
      user = "Guest User"; // Simulate a user login
      document.getElementById("user-status").innerText = `Logged in as: ${user}`;
      document.getElementById("login-btn").style.display = "none";
      document.getElementById("logout-btn").style.display = "inline";
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      user = null;
      document.getElementById("user-status").innerText = "";
      document.getElementById("login-btn").style.display = "inline";
      document.getElementById("logout-btn").style.display = "none";
    });

    window.addEventListener("load", () => {
      showQuestion();
    });
  </script>
</body>
</html>
