<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSA Quiz App</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="auth-section">
    <button id="sign-in-btn">Sign In with Google</button>
    <button id="sign-out-btn" style="display:none;">Sign Out</button>
    <p id="user-info"></p>
  </div>

  <div class="toggle-theme">
    <label>
      <input type="checkbox" id="darkToggle"/> Dark Mode
    </label>
  </div>

  <div class="quiz-box">
    <h1>DSA Quiz App</h1>
    <div class="timer">Time Left: <span id="time">15</span>s</div>
    <div id="question-container">
      <div id="question">Question here</div>
      <div id="answer-buttons" class="btn-grid"></div>
      <div id="explanation" class="explanation"></div>
    </div>
    <button id="next-btn">Next</button>
    <button id="restart-btn" style="display:none;">Restart Quiz</button>
  </div>

  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
